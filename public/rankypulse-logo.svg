<svg width="240" height="52" viewBox="0 0 240 52" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#5b4fcf"/>
    </linearGradient>
    <filter id="iconShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.35"/>
    </filter>
    <filter id="signalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="2" width="46" height="46" rx="12" fill="url(#iconGrad)" filter="url(#iconShadow)"/>
  <g filter="url(#signalGlow)">
    <polyline points="6,26 11,26 14.5,33 18.5,14 22,26 28,26 31,21 34,26 40,26" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="15,18 18.5,13 22,18" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="56" y="35" font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Ranky</text>
  <text x="130" y="35" font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif" font-size="26" font-weight="400" fill="#a5b4fc" letter-spacing="-0.5">Pulse</text>
</svg>